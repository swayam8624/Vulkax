name: Vulkax Atlas CI

on:
  push:
  pull_request:

jobs:
  linux-vulkan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ libglfw3-dev libglm-dev \
            nlohmann-json3-dev libsqlite3-dev libvulkan-dev vulkan-tools mesa-vulkan-drivers \
            libcurl4-openssl-dev glslang-tools xvfb
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Validate gateway runtime entrypoint
        run: |
          python3 -m py_compile services/atlas_gateway/server.py
          python3 services/atlas_gateway/server.py \
            --listen 127.0.0.1 --port 18080 \
            --replay data/atlas/navigation_replay.json &
          GATEWAY_PID=$!
          trap 'kill "$GATEWAY_PID" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:18080/v1/status >/dev/null; then
              exit 0
            fi
            sleep 0.25
          done
          exit 1
      - name: Resolve Lavapipe driver
        run: |
          LVP_ICD="$(find /usr/share/vulkan/icd.d /etc/vulkan/icd.d \
            -type f -name 'lvp_icd*.json' -print -quit 2>/dev/null)"
          test -n "$LVP_ICD"
          echo "VK_DRIVER_FILES=$LVP_ICD" >> "$GITHUB_ENV"
          echo "Lavapipe manifest: $LVP_ICD"
      - name: Verify Vulkan software device
        run: vulkaninfo --summary
      - name: Vulkan software smoke test
        run: |
          xvfb-run -a build/LveEngine --geo --geo-policy fixed-lod1 \
            --lights 10 --width 320 --height 180 --warmup-frames 1 --frames 1 \
            --capture-reference false --output /tmp/geobeacon-ci --quiet
      - name: Vulkax Atlas globe smoke test
        run: |
          xvfb-run -a build/VulkaxAtlas \
            --width 320 --height 180 --warmup-frames 1 --frames 1 \
            --output /tmp/atlas-ci --quiet
      - name: Upload smoke measurements
        uses: actions/upload-artifact@v7
        with:
          name: vulkax-lavapipe-smoke
          path: |
            /tmp/geobeacon-ci
            /tmp/atlas-ci
